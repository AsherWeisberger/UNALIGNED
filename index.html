<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

</svg>

<div id="root"></div>
<div id="boot-status" style="display:none;position:fixed;inset:24px;z-index:99999;padding:18px 20px;border-radius:12px;background:#fff7ed;color:#7c2d12;border:1px solid #fdba74;font:14px/1.5 -apple-system,BlinkMacSystemFont,Inter,sans-serif;box-shadow:0 18px 50px rgba(0,0,0,.15);overflow:auto;white-space:pre-wrap"></div>

<script>
(() => {
  const bootState = { errors: [] };
  const bootEl = document.getElementById('boot-status');
  const showBootMessage = (message) => {
    if (!bootEl) return;
    bootEl.style.display = 'block';
    bootEl.textContent = message;
  };

  window.__alignedBootOk = false;
  window.__alignedBootMarkReady = () => {
    window.__alignedBootOk = true;
    if (bootEl) bootEl.style.display = 'none';
  };

  window.addEventListener('error', (event) => {
    const msg = event?.message || 'Unknown startup error';
    const src = event?.filename ? '\n' + event.filename : '';
    const line = event?.lineno ? ':' + event.lineno : '';
    const col = event?.colno ? ':' + event.colno : '';
    const detail = event?.error?.stack || '';
    bootState.errors.push(msg + src + line + col + (detail ? '\n' + detail : ''));
    showBootMessage('UNALIGNED dashboard hit a startup error.\n\n' + bootState.errors.join('\n\n'));
  });

  window.addEventListener('unhandledrejection', (event) => {
    const reason = event?.reason;
    const msg = typeof reason === 'string'
      ? reason
      : (reason && reason.message) || 'Unhandled promise rejection';
    bootState.errors.push(msg);
    showBootMessage('UNALIGNED dashboard hit a startup error.\n\n' + bootState.errors.join('\n\n'));
  });

  window.setTimeout(() => {
    if (!window.__alignedBootOk && !(bootState.errors || []).length) {
      showBootMessage('UNALIGNED dashboard did not finish loading. One of the scripts is not completing startup.\n\n(This can happen on first load because Babel is transpiling ~10k lines of JSX in the browser. Try hard refresh or wait a bit longer.)');
    }
  }, 15000);
})();
</script>

<script type="text/babel" src="flow-v4/app-bundle.jsx?v=20260624-reader-split-1"></script>

</body>
