<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./robert/">
  <title>UNALIGNED Leads</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #111827;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }

    main {
      width: min(420px, calc(100vw - 48px));
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #64748b;
      line-height: 1.5;
    }

    a {
      color: #0f172a;
      font-weight: 700;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening UNALIGNED Leads</h1>
    <p>The Robert lead inbox is now the default view.</p>
    <a href="./robert/">Open inbox</a>
  </main>
  <script>location.replace("./robert/");</script>
</body>
</html>
