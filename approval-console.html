<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNALIGNED // Approval Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('unaligned-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
<style>
  :root{
    --bg:#0c0b0a;--panel:#131110;--surface:#191714;--surface2:#211e1a;--elevated:#26221c;
    --border:#26231e;--border2:#34302a;
    --text:#f4f0e8;--muted:#a69d8f;--muted2:#6e665b;
    --accent:#fa3c1e;--accent-hover:#e23316;--accent-soft:rgba(250,60,30,.12);--accent-glow:rgba(250,60,30,.20);
    --mint:#46b277;--mint-bright:#5bc88a;
    --reply:#d56a35;--payment:#1f8a5b;--brief:#6b46c1;--post:#2f5fd6;
    --ok:#46b277;--warn:#f59e0b;--err:#ef4444;
    --fdisp:'Space Grotesk','Inter Tight',system-ui,sans-serif;
    --fbody:'Inter',system-ui,sans-serif;
  }
  [data-theme="light"]{
    --bg:#efece3;--panel:#f3f0e8;--surface:#f9f7f1;--surface2:#eae6dc;--elevated:#ffffff;
    --border:rgba(22,19,13,.14);--border2:rgba(22,19,13,.24);
    --text:#16130d;--muted:#565049;--muted2:#8c857b;
    --accent:#ec2f17;--accent-hover:#cf2810;--accent-soft:rgba(236,47,23,.10);--accent-glow:rgba(236,47,23,.13);
    --mint:#1f8a5b;--mint-bright:#26a06b;
    --ok:#1f8a5b;--warn:#b0740f;--err:#cf2d2d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1100px 540px at 85% -12%,var(--accent-glow),transparent 60%),var(--bg);
    color:var(--text);font-family:var(--fbody);line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;transition:background .25s ease,color .25s ease}
  h1{font-family:var(--fdisp)}
  .mono{font-family:'JetBrains Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .app{display:flex;flex-direction:column;height:100vh}

  /* topbar */
  .topbar{flex:0 0 auto;height:56px;display:flex;align-items:center;gap:16px;padding:0 22px;border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(8px);z-index:5}
  .brand{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;font-weight:600;display:flex;align-items:center;gap:9px;white-space:nowrap}
  .brand .u{color:var(--accent)}
  .brand .sub{color:var(--muted2);letter-spacing:.06em;font-weight:400}
  .spacer{flex:1}
  .endpoint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:7px}
  .endpoint b{color:var(--muted);font-weight:500}
  .themebtn{font-size:15px;color:var(--muted);width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:.13s}
  .themebtn:hover{color:var(--text);border-color:var(--border2)}
  /* arm switch */
  .arm{display:flex;align-items:center;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.06em}
  .arm button{padding:6px 12px;border-radius:6px;color:var(--muted2);transition:.13s}
  .arm button.on[data-arm="dry"]{background:var(--surface2);color:var(--mint)}
  .arm button.on[data-arm="live"]{background:var(--err);color:#190a0b}
  .meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted2)}

  .body{flex:1;display:grid;grid-template-columns:392px 1fr;min-height:0}

  /* list */
  .list{border-right:1px solid var(--border);background:var(--panel);overflow-y:auto;padding:14px 12px 50px}
  .listhead{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 12px}
  .listhead .t{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2)}
  .listhead .c{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mint);font-weight:600}
  .sect{margin:14px 6px 7px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);display:flex;align-items:center;gap:8px}
  .sect i{width:7px;height:7px;border-radius:2px}
  .sect .n{margin-left:auto;color:var(--muted2)}
  .item{display:flex;gap:11px;align-items:flex-start;padding:11px 11px;border-radius:11px;cursor:pointer;transition:.12s;border:1px solid transparent;position:relative}
  .item:hover{background:var(--surface)}
  .item.sel{background:var(--surface);border-color:var(--border2)}
  .item.sel::before{content:"";position:absolute;left:-12px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--c,var(--mint))}
  .item .av{width:36px;height:36px;border-radius:9px;flex:0 0 auto;object-fit:cover}
  .item .mid{min-width:0;flex:1}
  .item .top{display:flex;align-items:center;gap:8px}
  .item .subj{font-size:14px;font-weight:650;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .amt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mint);font-weight:600;white-space:nowrap}
  .item .sm{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .cleared{margin-top:24px}
  .cleared .item{cursor:default;opacity:.66}
  .cleared .item:hover{background:transparent}
  .resb{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}
  .resb.ap{color:var(--ok);background:rgba(110,231,135,.12)}
  .resb.dn{color:var(--err);background:rgba(240,113,122,.12)}

  /* detail */
  .detail{overflow-y:auto;padding:0}
  .dwrap{max-width:760px;margin:0 auto;padding:28px 34px 60px}
  .gtag{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.1em;padding:5px 11px;border-radius:20px;color:var(--c);background:color-mix(in srgb,var(--c) 14%,transparent);border:1px solid color-mix(in srgb,var(--c) 34%,transparent)}
  h1{font-size:34px;font-weight:800;letter-spacing:-.025em;margin:16px 0 4px}
  .from{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;margin-bottom:26px}
  .from .av{width:26px;height:26px;border-radius:7px;object-fit:cover}
  .from .mdl{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted2);margin-left:4px}
  .from .when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2)}

  .block{margin-bottom:22px}
  .lab{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
  .what{font-size:20px;font-weight:600;letter-spacing:-.01em;color:var(--text);line-height:1.4}
  .why{font-size:15px;color:var(--text);line-height:1.6}

  .ctx{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  .ctx .c{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 14px}
  .ctx .c .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px}
  .ctx .c .v{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .stage{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--sc,#9aa);background:color-mix(in srgb,var(--sc,#888) 16%,transparent);border:1px solid color-mix(in srgb,var(--sc,#888) 38%,transparent);border-radius:6px;padding:2px 6px}

  .artifact{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:22px}
  .artifact .ah{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .artifact .ah .ed{margin-left:auto;font-size:11px;letter-spacing:.04em;color:var(--mint);text-transform:none;cursor:pointer}
  .artifact .body{padding:14px 16px;font-size:13.5px;line-height:1.65;color:var(--text);white-space:pre-wrap}
  .artifact textarea{width:100%;min-height:130px;font-family:inherit;font-size:13.5px;line-height:1.65;color:var(--text);background:var(--bg);border:none;border-top:1px solid var(--border);padding:14px 16px;resize:vertical}
  .artifact textarea:focus{outline:none}
  .pay{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .pay .p{padding:13px 16px;border-top:1px solid var(--border)}
  .pay .p:nth-child(odd){border-right:1px solid var(--border)}
  .pay .p .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}
  .pay .p .v{font-size:15px;font-weight:600}
  .pay .p .v.big{color:var(--mint);font-family:'JetBrains Mono',monospace}

  .effect{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .effect .lab{margin-bottom:10px}
  .efl{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:9px;padding:3px 0}
  .efl .d{width:6px;height:6px;border-radius:50%;background:var(--mint);flex:0 0 auto}
  .viewp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);cursor:pointer;margin-top:10px;display:inline-flex;gap:6px;align-items:center;border:1px solid var(--border);border-radius:7px;padding:5px 9px}
  pre.payload{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;overflow-x:auto;display:none;white-space:pre}

  /* deny subpanel */
  .deny{border:1px solid color-mix(in srgb,var(--err) 40%,var(--border));background:color-mix(in srgb,var(--err) 6%,var(--surface));border-radius:12px;padding:15px 16px;margin-bottom:14px}
  .deny .dh{font-size:14px;font-weight:650;color:var(--err);margin-bottom:6px}
  .deny .dwhy{font-size:13px;color:var(--muted);margin-bottom:11px}
  .deny .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
  .chip{font-size:12px;color:var(--text);border:1px solid color-mix(in srgb,var(--err) 35%,transparent);background:color-mix(in srgb,var(--err) 8%,transparent);border-radius:20px;padding:5px 11px;cursor:pointer;transition:.12s}
  .chip:hover{background:color-mix(in srgb,var(--err) 16%,transparent)}
  .deny input{width:100%;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 11px}
  .deny input:focus{outline:none;border-color:var(--err)}

  /* action bar */
  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:26px;padding-top:20px;border-top:1px solid var(--border)}
  .bar.armed{border-top-color:color-mix(in srgb,var(--err) 50%,var(--border))}
  .btn{font-size:14px;font-weight:650;padding:12px 20px;border-radius:10px;transition:.13s;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px}
  .btn.app{background:var(--mint);color:#08120b;flex:1;justify-content:center}
  .btn.app:hover{background:var(--mint-bright)}
  .bar.armed .btn.app{box-shadow:0 0 0 2px color-mix(in srgb,var(--err) 60%,transparent)}
  .btn.edit{background:transparent;border-color:var(--border2);color:var(--text)}
  .btn.edit:hover{border-color:var(--muted)}
  .btn.deny{background:transparent;border-color:var(--border2);color:var(--muted)}
  .btn.deny:hover{border-color:var(--err);color:var(--err)}
  .btn.ghost{background:transparent;border-color:var(--border2);color:var(--muted)}
  .kbd{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.7;border:1px solid currentColor;border-radius:4px;padding:0 4px;margin-left:2px}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted2);text-align:center;padding:40px}
  .empty .big{font-size:22px;color:var(--muted);margin-bottom:8px;font-weight:650}
  .empty .ico{font-size:40px;margin-bottom:14px}

  /* toast */
  .toasts{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:30;max-width:420px}
  .toast{background:var(--surface2);border:1px solid var(--border2);border-left:3px solid var(--ok);border-radius:11px;padding:13px 15px;box-shadow:0 18px 50px -18px rgba(0,0,0,.9);animation:slide .25s ease}
  .toast.dry{border-left-color:var(--warn)}
  .toast.err{border-left-color:var(--err)}
  .toast .tt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.08em;display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .toast.ok .tt{color:var(--ok)} .toast.dry .tt{color:var(--warn)} .toast.err .tt{color:var(--err)}
  .toast .ef{font-size:12px;color:var(--text);line-height:1.5}
  .toast .ef .mono{color:var(--muted)}
  @keyframes slide{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;border:2px solid var(--bg)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media(max-width:880px){body{overflow:auto}.app{height:auto}.body{grid-template-columns:1fr}.list{border-right:none;border-bottom:1px solid var(--border)}.detail{overflow:visible}.bar{position:static}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="u">UNALIGNED</span> // APPROVAL CONSOLE <span class="sub">· four gates, one surface</span></div>
    <div class="spacer"></div>
    <div class="endpoint" id="epRead"></div>
    <div class="arm" id="arm">
      <button data-act="arm" data-arm="dry" class="on">DRY RUN</button>
      <button data-act="arm" data-arm="live">ARMED</button>
    </div>
    <button class="themebtn" data-act="theme" title="Toggle light or dark">◐</button>
    <div class="meta">operator: Ash</div>
  </div>

  <div class="body">
    <aside class="list" id="list"></aside>
    <main class="detail" id="detail"></main>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>

const S={armed:CONFIG.armed, selected:ITEMS[0].id, editing:false, denying:false};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const pending=()=>ITEMS.filter(i=>!i.resolved);
const cleared=()=>ITEMS.filter(i=>i.resolved);
const byId=id=>ITEMS.find(i=>i.id===id);

function render(){renderEndpoint();renderList();renderDetail();}

function renderEndpoint(){
  const ep=CONFIG.endpoint? CONFIG.endpoint.replace(/^https?:\/\//,'') : 'no endpoint set · preview';
  document.getElementById('epRead').innerHTML=`<b>endpoint</b> ${esc(ep)}`;
  document.querySelectorAll('#arm button').forEach(b=>b.classList.toggle('on',(b.dataset.arm==='live')===S.armed));
}

function itemRow(i,clearedRow){
  const sc=SEC[i.section].c;
  const av=AV[i.organ]?`<img class="av" src="${AV[i.organ]}" alt="">`:'';
  if(clearedRow){
    const ap=i.resolved.state==='approved';
    return `<div class="item">${av}<div class="mid"><div class="top"><span class="subj">${esc(i.subject)}</span>
      <span class="resb ${ap?'ap':'dn'}">${ap?'✓ '+i.resolved.mode:'✕ denied'}</span></div>
      <div class="sm">${esc(i.summary)}</div></div></div>`;
  }
  return `<div class="item ${S.selected===i.id?'sel':''}" style="--c:${sc}" data-act="select" data-id="${i.id}">
    ${av}<div class="mid"><div class="top"><span class="subj">${esc(i.subject)}</span>${i.amt?`<span class="amt">${esc(i.amt)}</span>`:''}</div>
    <div class="sm">${esc(i.summary)}</div></div></div>`;
}

function renderList(){
  const P=pending();
  let h=`<div class="listhead"><span class="t">Pending approvals</span><span class="c">${P.length}</span></div>`;
  ['reply','payment','brief','post'].forEach(sec=>{
    const items=P.filter(i=>i.section===sec); if(!items.length)return;
    h+=`<div class="sect"><i style="background:${SEC[sec].c}"></i>${SEC[sec].label}<span class="n">${items.length}</span></div>`;
    h+=items.map(i=>itemRow(i,false)).join('');
  });
  const C=cleared();
  if(C.length){
    h+=`<div class="cleared"><div class="sect">Cleared today<span class="n">${C.length}</span></div>`;
    h+=C.map(i=>itemRow(i,true)).join('')+`</div>`;
  }
  document.getElementById('list').innerHTML=h;
}

function ctxCards(i){
  const sc=STAGEC[i.lead.stage]||'#888';
  const cells=[
    ['Lead',`${esc(i.lead.brand)} <span class="stage" style="--sc:${sc}">${i.lead.stage}</span>`],
    ['Value',esc(i.lead.value)],
    [i.section==='payment'?'Reference':(i.section==='post'?'Channel':'Recipient'),esc(i.channel)],
    ['When',esc(i.date)]
  ];
  return `<div class="ctx">${cells.map(([k,v])=>`<div class="c"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('')}</div>`;
}

function artifactBlock(i){
  if(i.artType==='Payment'){
    const p=i.pay;
    return `<div class="artifact"><div class="ah">Payment details</div>
      <div class="pay">
        <div class="p"><div class="k">Amount</div><div class="v big">${esc(p.amount)}</div></div>
        <div class="p"><div class="k">Method</div><div class="v">${esc(p.method)}</div></div>
        <div class="p"><div class="k">Invoice</div><div class="v">${esc(p.invoice)}</div></div>
        <div class="p"><div class="k">Due</div><div class="v">${esc(p.due)}</div></div>
      </div></div>`;
  }
  const body=S.editing
    ? `<textarea id="artTA">${esc(i.draft)}</textarea>`
    : `<div class="body">${esc(i.draft)}</div>`;
  return `<div class="artifact"><div class="ah">${esc(i.artType)}${i.section==='reply'?' · Asher’s voice':''}
      <span class="ed" data-act="${S.editing?'cancelEdit':'edit'}">${S.editing?'cancel edit':'edit'}</span></div>${body}</div>`;
}

function payloadFor(i,action,reason,draft){
  const p={id:i.id,gate:SEC[i.section].verb,action,card:i.card,lead:i.lead.brand};
  if(action==='approve'){ if(i.advanceTo)p.advanceTo=i.advanceTo; if(i.draft)p.body=draft??i.draft; if(i.pay)p.amount=i.pay.amount; }
  if(action==='deny'){ p.reason=reason||''; }
  p.by='ash'; p.at=new Date().toISOString();
  return p;
}

function renderDetail(){
  const i=byId(S.selected);
  const D=document.getElementById('detail');
  if(!i||i.resolved){
    const P=pending();
    if(P.length){S.selected=P[0].id;return renderDetail();}
    D.innerHTML=`<div class="empty"><div class="ico">✓</div><div class="big">Queue clear</div><div class="mono">no pending approvals</div></div>`;
    return;
  }
  const sc=SEC[i.section].c, org=ORG[i.organ];
  const eff=i.effect.map(e=>`<div class="efl"><span class="d"></span>${esc(e)}</div>`).join('');
  const payload=payloadFor(i,'approve');
  let denyBlock='';
  if(S.denying){
    denyBlock=`<div class="deny">
      <div class="dh">Deny: ${esc(i.subject)}</div>
      <div class="dwhy">You are holding this gate. Nothing fires and the lead stays at <span class="mono">${i.lead.stage}</span>. Common reasons:</div>
      <div class="chips">${i.deny.map(d=>`<span class="chip" data-act="denychip" data-v="${esc(d)}">${esc(d)}</span>`).join('')}</div>
      <input id="denyReason" placeholder="Reason to hold (optional)" autocomplete="off">
    </div>`;
  }
  const armed=S.armed;
  let bar;
  if(S.editing){
    bar=`<div class="bar ${armed?'armed':''}"><button class="btn app" data-act="approveEdit">Approve with changes <span class="kbd">↵</span></button>
      <button class="btn ghost" data-act="cancelEdit">Cancel</button></div>`;
  } else if(S.denying){
    bar=`<div class="bar"><button class="btn deny" data-act="confirmDeny" style="flex:1;justify-content:center;border-color:var(--err);color:var(--err)">Confirm deny</button>
      <button class="btn ghost" data-act="cancelDeny">Cancel <span class="kbd">esc</span></button></div>`;
  } else {
    bar=`<div class="bar ${armed?'armed':''}">
      <button class="btn app" data-act="approve">${armed?'Approve & fire':'Approve'} <span class="kbd">A</span></button>
      <button class="btn edit" data-act="edit">Edit <span class="kbd">E</span></button>
      <button class="btn deny" data-act="deny">Deny <span class="kbd">D</span></button></div>`;
  }
  D.innerHTML=`<div class="dwrap">
    <span class="gtag" style="--c:${sc}">${i.gate}</span>
    <h1>${esc(i.subject)}</h1>
    <div class="from">${AV[i.organ]?`<img class="av" src="${AV[i.organ]}">`:''} from ${esc(org.name)} <span class="mdl">${esc(org.model)}</span><span class="when">${esc(i.date)}</span></div>

    <div class="block"><div class="lab">What you are approving</div><div class="what">${esc(i.what)}</div></div>
    <div class="block"><div class="lab">Why it makes sense</div><div class="why">${esc(i.why)}</div></div>
    ${ctxCards(i)}
    ${artifactBlock(i)}
    ${denyBlock}
    <div class="effect"><div class="lab">${armed?'Fires on approve':'Would fire on approve'}</div>${eff}
      <span class="viewp" data-act="viewp">{ } view action payload</span>
      <pre class="payload" id="pl">${esc(JSON.stringify(payload,null,2))}</pre>
    </div>
    ${bar}
  </div>`;
  if(S.editing){const ta=document.getElementById('artTA');if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}}
  if(S.denying){const r=document.getElementById('denyReason');if(r)r.focus();}
}

/* ===== dispatch: the real action ===== */
async function dispatch(payload,effect){
  if(S.armed && CONFIG.endpoint){
    try{
      const r=await fetch(CONFIG.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      return {mode:'FIRED',ok:r.ok,status:r.status,payload,effect};
    }catch(e){return {mode:'FIRED',ok:false,error:String(e),payload,effect};}
  }
  if(S.armed && !CONFIG.endpoint){return {mode:'ARMED',ok:true,note:'no endpoint set, payload ready',payload,effect};}
  return {mode:'DRY RUN',ok:true,payload,effect};
}

function toast(res,item,action){
  const cls=res.mode==='DRY RUN'?'dry':(res.ok?'ok':'err');
  const head = action==='deny' ? `DENIED · held` : `${res.mode}${res.ok?'':' · failed'}`;
  const lines = action==='deny'
    ? `Held <span class="mono">${esc(item.subject)}</span>. Nothing fired. Lead stays at <span class="mono">${item.lead.stage}</span>.`
    : item.effect.map(e=>esc(e)).join('<br>');
  const extra = res.mode==='FIRED'?` · POST ${esc((CONFIG.endpoint||'').replace(/^https?:\/\//,''))} ${res.ok?('· '+res.status):('· '+esc(res.error||'error'))}` : (res.note?` · ${esc(res.note)}`:'');
  const t=document.createElement('div');
  t.className=`toast ${cls}`;
  t.innerHTML=`<div class="tt">${head}${extra}</div><div class="ef">${lines}</div>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),420);},5200);
}

async function resolve(action,reason){
  const i=byId(S.selected); if(!i||i.resolved)return;
  let draft=i.draft;
  if(action==='approveEdit'){const ta=document.getElementById('artTA'); if(ta)draft=ta.value; action='approve';}
  const payload=payloadFor(i,action==='deny'?'deny':'approve',reason,draft);
  const res=await dispatch(payload,i.effect);
  i.resolved={state:action==='deny'?'denied':'approved',mode:res.mode,reason:reason||'',ts:Date.now()};
  if(action!=='deny' && i.advanceTo)i.lead.stage=i.advanceTo;
  S.editing=false;S.denying=false;
  toast(res,i,action);
  const P=pending(); S.selected=P.length?P[0].id:null;
  render();
}

/* ===== events ===== */
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-act]'); if(!b)return;
  const a=b.dataset.act;
  if(a==='theme'){toggleTheme();return;}
  if(a==='arm'){S.armed=(b.dataset.arm==='live');renderEndpoint();renderDetail();}
  else if(a==='select'){S.selected=b.dataset.id;S.editing=false;S.denying=false;render();}
  else if(a==='edit'){S.editing=true;S.denying=false;renderDetail();}
  else if(a==='cancelEdit'){S.editing=false;renderDetail();}
  else if(a==='approve'){resolve('approve');}
  else if(a==='approveEdit'){resolve('approveEdit');}
  else if(a==='deny'){S.denying=true;S.editing=false;renderDetail();}
  else if(a==='cancelDeny'){S.denying=false;renderDetail();}
  else if(a==='denychip'){const r=document.getElementById('denyReason');if(r){r.value=b.dataset.v;r.focus();}}
  else if(a==='confirmDeny'){const r=document.getElementById('denyReason');resolve('deny',r&&r.value.trim()?r.value.trim():'');}
  else if(a==='viewp'){const pl=document.getElementById('pl');if(pl)pl.style.display=pl.style.display==='block'?'none':'block';}
});

document.addEventListener('keydown',e=>{
  const typing=/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName);
  if(e.key==='Escape'){if(S.editing||S.denying){S.editing=false;S.denying=false;renderDetail();}return;}
  if(typing)return;
  const P=pending(); if(!P.length)return;
  const idx=P.findIndex(i=>i.id===S.selected);
  if(e.key==='ArrowDown'){e.preventDefault();S.selected=P[Math.min(idx+1,P.length-1)].id;S.editing=S.denying=false;render();}
  else if(e.key==='ArrowUp'){e.preventDefault();S.selected=P[Math.max(idx-1,0)].id;S.editing=S.denying=false;render();}
  else if(e.key.toLowerCase()==='a'&&!S.denying&&!S.editing)resolve('approve');
  else if(e.key.toLowerCase()==='e'&&!S.denying){S.editing=true;renderDetail();}
  else if(e.key.toLowerCase()==='d'&&!S.editing){S.denying=true;renderDetail();}
});

function toggleTheme(){var h=document.documentElement;var t=h.getAttribute('data-theme')==='light'?'dark':'light';h.setAttribute('data-theme',t);try{localStorage.setItem('unaligned-theme',t);}catch(e){}syncThemeBtn();}
function syncThemeBtn(){var b=document.querySelector('.themebtn');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='light'?'◐':'◑';}
render(); syncThemeBtn();
</script>
