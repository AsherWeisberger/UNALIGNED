<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UNALIGNED Lead Mail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./robert.css?v=reply-room-2">
  </head>
  <body>
    <main class="mail-app">
      <header class="mail-topbar">
        <div class="brand">
          <a href="../">UNALIGNED</a>
          <span>Lead Mail</span>
        </div>
        <label class="search-wrap">
          <span>Search</span>
          <input id="search" type="search" placeholder="Search leads, companies, stages, context" autocomplete="off">
        </label>
        <nav class="top-actions">
          <a href="./pitch/">Brief</a>
          <a href="../">Board</a>
          <button id="refresh-btn" type="button">Refresh</button>
        </nav>
      </header>

      <section class="mail-layout">
        <aside class="sidebar">
          <button class="compose-btn" id="compose-btn" type="button" aria-label="Compose lead reply"><span>+</span><strong>Reply</strong></button>
          <nav class="folders" aria-label="Lead folders">
            <button class="folder active" data-view="today" type="button"><span>Inbox</span><strong id="count-today">0</strong></button>
            <button class="folder" data-view="sent" type="button"><span>Sent</span><strong id="count-sent">0</strong></button>
            <button class="folder" data-view="reply" type="button"><span>Needs reply</span><strong id="count-reply">0</strong></button>
            <button class="folder" data-view="overdue" type="button"><span>Overdue</span><strong id="count-overdue">0</strong></button>
            <button class="folder" data-view="money" type="button"><span>Money</span><strong id="count-money">0</strong></button>
            <button class="folder" data-view="tomorrow" type="button"><span>Tomorrow</span><strong id="count-tomorrow">0</strong></button>
            <button class="folder" data-view="cleanup" type="button"><span>Cleanup</span><strong id="count-cleanup">0</strong></button>
            <button class="folder" data-view="closed" type="button"><span>Closed</span><strong id="count-closed">0</strong></button>
            <button class="folder" data-view="all" type="button"><span>All leads</span><strong id="count-all">0</strong></button>
          </nav>
          <div class="sync-card">
            <span id="sync-status">Loading Supabase</span>
            <strong id="focus-count">0 focus items</strong>
          </div>
        </aside>

        <section class="inbox">
          <div class="inbox-head">
            <div>
              <p id="view-eyebrow">Inbox</p>
              <h1 id="view-title">Lead inbox</h1>
            </div>
            <span id="queue-count">0</span>
          </div>
          <div class="list-toolbar">
            <button class="chip active" data-view="today" type="button">Primary</button>
            <button class="chip" data-view="sent" type="button">Sent</button>
            <button class="chip" data-view="reply" type="button">Replies</button>
            <button class="chip" data-view="money" type="button">Revenue</button>
            <button class="chip" data-view="cleanup" type="button">Data</button>
          </div>
          <div id="lead-list" class="lead-list" aria-label="Lead messages"></div>
        </section>

        <section id="detail" class="thread">
          <div class="empty">
            <p>Select a lead</p>
            <h2>The thread, context, and reply box will appear here.</h2>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="./robert.js?v=reply-room-2"></script>
  </body>
</html>
