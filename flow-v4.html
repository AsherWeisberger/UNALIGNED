<div id="root"></div>
<div id="boot-status" style="display:none;position:fixed;inset:24px;z-index:99999;padding:18px 20px;border-radius:12px;background:#fff7ed;color:#7c2d12;border:1px solid #fdba74;font:14px/1.5 -apple-system,BlinkMacSystemFont,Inter,sans-serif;box-shadow:0 18px 50px rgba(0,0,0,.15);overflow:auto;white-space:pre-wrap"></div>

<script>
(() => {
  const bootState = { errors: [] };
  const bootEl = document.getElementById('boot-status');
  const showBootMessage = (message) => {
    if (!bootEl) return;
    bootEl.style.display = 'block';
    bootEl.textContent = message;
  };

  window.__alignedBootOk = false;
  window.__alignedBootMarkReady = () => {
    window.__alignedBootOk = true;
    if (bootEl) bootEl.style.display = 'none';
  };

  window.addEventListener('error', (event) => {
    const msg = event?.message || 'Unknown startup error';
    const src = event?.filename ? '\n' + event.filename : '';
    const line = event?.lineno ? ':' + event.lineno : '';
    bootState.errors.push(msg + src + line);
    showBootMessage('UNALIGNED dashboard hit a startup error.\n\n' + bootState.errors.join('\n\n'));
  });

  window.addEventListener('unhandledrejection', (event) => {
    const reason = event?.reason;
    const msg = typeof reason === 'string'
      ? reason
      : (reason && reason.message) || 'Unhandled promise rejection';
    bootState.errors.push(msg);
    showBootMessage('UNALIGNED dashboard hit a startup error.\n\n' + bootState.errors.join('\n\n'));
  });

  // Auto-hide + force render helper if scripts finish late
  let forceAttempted = false;
  const tryForceRender = () => {
    if (window.__alignedBootOk) return;
    const rootEl = document.getElementById('root');
    if (window.V4App && typeof ReactDOM !== 'undefined' && typeof React !== 'undefined' && rootEl) {
      try {
        const r = ReactDOM.createRoot(rootEl);
        r.render(React.createElement(window.V4App));
        window.__alignedBootOk = true;
        if (bootEl) bootEl.style.display = 'none';
        console.log('[boot] Force rendered V4App after delay');
      } catch (e) {
        console.error('[boot] Force render attempt failed', e);
      }
    }
  };

  const pollInterval = setInterval(() => {
    if (window.__alignedBootOk) {
      clearInterval(pollInterval);
      if (bootEl) bootEl.style.display = 'none';
      return;
    }
    tryForceRender();
  }, 3000);

  window.setTimeout(() => {
    if (!window.__alignedBootOk && !(bootState.errors || []).length) {
      showBootMessage('UNALIGNED dashboard did not finish loading. One of the scripts is not completing startup.\n\n(This can happen because Babel is transpiling several JSX files in the browser. Hard refresh + wait, or check the Console for details.)\n\n[Force continue]');

      // Add a force button
      if (bootEl) {
        const btn = document.createElement('button');
        btn.textContent = 'Force try to render anyway';
        btn.style.cssText = 'margin-top:12px;padding:8px 12px;background:#fff;border:1px solid #c2410f;border-radius:6px;cursor:pointer;font-size:13px';
        btn.onclick = () => {
          clearInterval(pollInterval);
          bootEl.style.display = 'none';
          window.__alignedBootOk = true;
          tryForceRender();
          if (!window.__alignedBootOk && window.V4App) {
            // one more try
            setTimeout(tryForceRender, 500);
          }
        };
        bootEl.appendChild(btn);
      }
    }
  }, 25000);
})();
</script>
