<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOW — Table View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }

  /* ── Toolbar ─────────────────────────────── */
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: #1a1d27;
    border-bottom: 1px solid #2d3139;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .toolbar h1 {
    font-size: 16px; font-weight: 700; color: #4facfe;
    margin-right: 10px; white-space: nowrap;
  }

  .toolbar input[type="text"],
  .toolbar select {
    background: #252836;
    border: 1px solid #3d4251;
    color: #e2e8f0;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
  }

  .toolbar input[type="text"]:focus,
  .toolbar select:focus {
    border-color: #4facfe;
  }

  .search-input {
    flex: 1; min-width: 200px; max-width: 350px;
  }

  .toolbar select { cursor: pointer; }

  .btn {
    background: #252836;
    border: 1px solid #3d4251;
    color: #e2e8f0;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #2d3141; }
  .btn.active { background: #4facfe; color: #0f1117; border-color: #4facfe; }

  .toolbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: #6b7280;
  }

  .row-count {
    font-size: 12px; color: #6b7280;
    white-space: nowrap;
  }

  /* ── Table ───────────────────────────────── */
  .table-wrap {
    padding: 0 20px 40px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1100px;
  }

  thead tr {
    position: sticky; top: 52px;
    background: #1a1d27;
    z-index: 50;
  }

  th {
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    border-bottom: 1px solid #2d3139;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: #e2e8f0; }
  th.sorted { color: #4facfe; }

  .sort-arrow { margin-left: 4px; font-size: 9px; }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid #1f2330;
    vertical-align: top;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tr:hover td { background: #1a1d27; }

  /* Stage badge */
  .stage {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* Temperature */
  .temp {
    font-weight: 700; font-size: 12px;
  }
  .temp-cold { color: #60a5fa; }
  .temp-warm { color: #fbbf24; }
  .temp-hot { color: #f87171; }

  /* Priority dot */
  .priority { font-size: 11px; font-weight: 600; }
  .priority-high { color: #f87171; }
  .priority-med   { color: #fbbf24; }
  .priority-low   { color: #34d399; }

  /* Labels */
  .labels { display: flex; gap: 4px; flex-wrap: wrap; }
  .label-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
    background: #252836;
    border: 1px solid #3d4251;
  }

  /* Value */
  .value { font-weight: 600; color: #34d399; }

  /* Source badge */
  .source { font-size: 11px; color: #6b7280; }

  /* Description preview */
  .desc { color: #9ca3af; font-size: 12px; max-width: 200px; }

  /* Assignee */
  .assignee {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px;
  }
  .avatar-sm {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  /* Due date */
  .due { font-size: 11px; color: #6b7280; }
  .due.overdue { color: #f87171; }

  /* Contact info */
  .contact-name { font-weight: 600; color: #e2e8f0; }
  .contact-email { font-size: 11px; color: #4facfe; text-decoration: none; }
  .contact-email:hover { text-decoration: underline; }
  .contact-phone { font-size: 11px; color: #9ca3af; }
  .contact-business { font-size: 11px; color: #6b7280; }

  /* Activity */
  .activity { font-size: 11px; color: #6b7280; max-width: 160px; }

  /* Loading */
  #loading {
    padding: 60px 20px;
    text-align: center;
    color: #6b7280;
    font-size: 14px;
  }

  #loading::after {
    content: '';
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid #3d4251;
    border-top-color: #4facfe;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  #error {
    padding: 40px 20px;
    text-align: center;
    color: #f87171;
    font-size: 14px;
  }

  /* Scroll hint */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f1117; }
  ::-webkit-scrollbar-thumb { background: #2d3139; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d4251; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>FLOW — Table View</h1>

  <input type="text" class="search-input" id="search"
    placeholder="Search name, email, business, notes..."
    autocomplete="off">

  <select id="filter-stage">
    <option value="">All Stages</option>
    <option value="discovery">Lead In</option>
    <option value="build">In Progress</option>
    <option value="review">Review</option>
    <option value="done">Done</option>
    <option value="paid-out">Paid Out</option>
    <option value="anything-else">Anything Else</option>
  </select>

  <select id="filter-temp">
    <option value="">All Temps</option>
    <option value="hot">Hot 🔴</option>
    <option value="warm">Warm 🟡</option>
    <option value="cold">Cold 🔵</option>
    <option value="unscored">Unscored</option>
  </select>

  <select id="filter-priority">
    <option value="">All Priority</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <select id="filter-assignee">
    <option value="">All Assignees</option>
    <option value="Asher W">Asher W</option>
    <option value="Robert S">Robert S</option>
    <option value="Sam L">Sam L</option>
  </select>

  <button class="btn" id="btn-export">Export CSV</button>

  <div class="toolbar-right">
    <span class="row-count" id="row-count"></span>
  </div>
</div>

<div id="loading">Loading leads...</div>
<div id="error" style="display:none"></div>

<div class="table-wrap" style="display:none" id="table-wrap">
  <table id="table">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Firebase static imports (same as working local file) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...6VRA",
  authDomain: "unaligned-fc556.firebaseapp.com",
  projectId: "unaligned-fc556",
  storageBucket: "unaligned-fc556.firebasestorage.app",
  messagingSenderId: "720311168962",
  appId: "1:720311168962:web:18d9f60626671a6e13f05b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const boardDocRef = doc(db, 'boards', 'shared-board');

// ── Helpers ──────────────────────────────────────────────────
const stageMap = {
  'discovery':     { label: 'LEAD IN',     color: '#94a3b8' },
  'build':         { label: 'IN PROGRESS', color: '#3b82f6' },
  'review':        { label: 'REVIEW',       color: '#fbbf24' },
  'done':          { label: 'DONE',         color: '#34d399' },
  'paid-out':      { label: 'PAID OUT',     color: '#a855f7' },
  'anything-else': { label: 'ANYTHING ELSE', color: '#6b7280' }
};

const avatarGradients = {
  'Asher W':  'linear-gradient(135deg,#4facfe,#00f2fe)',
  'Robert S': 'linear-gradient(135deg,#f093fb,#f5576c)',
  'Sam L':    'linear-gradient(135deg,#667eea,#764ba2)'
};

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function getAvatarGradient(name) {
  return avatarGradients[name] || 'linear-gradient(135deg,#6b7280,#4b5563)';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMins / 60);
  const diffDays = Math.floor(diffHours / 24);
  if (diffMins < 1) return 'Just now';
  if (diffMins < 60) return `${diffMins}m ago`;
  if (diffHours < 24) return `${diffHours}h ago`;
  if (diffDays < 7) return `${diffDays}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function parseTemp(score) {
  score = Number(score);
  if (isNaN(score)) return { label: '—', cls: '', level: 'unscored' };
  if (score >= 60) return { label: `${score} Hot`, cls: 'temp-hot', level: 'hot' };
  if (score >= 40) return { label: `${score} Warm`, cls: 'temp-warm', level: 'warm' };
  return { label: `${score} Cold`, cls: 'temp-cold', level: 'cold' };
}

function getLastActivity(card) {
  if (!card.activity || card.activity.length === 0) return 'No activity';
  const last = card.activity[card.activity.length - 1];
  return `${last.user}: ${last.action} (${formatDate(last.time)})`;
}

// ── CSV Export ──────────────────────────────────────────────
function exportCSV(cards) {
  const headers = ['Contact Name','Business','Email','Phone','Stage','Temperature','Score','Deal Value','Priority','Assignee','Source','Due Date','Title','Notes','Last Activity'];
  const rows = cards.map(c => [
    c.contactName || c.title || '',
    c.businessName || '',
    c.email || '',
    c.phone || '',
    stageMap[c.listId]?.label || c.listId || '',
    parseTemp(c.score || c.temperature)?.level || '',
    c.score || c.temperature || '',
    c.estimatedValue || '',
    c.priority || '',
    c.assignee || '',
    c.leadSource || '',
    c.dueDate || '',
    (c.title || '').replace(/"/g, '""'),
    (c.description || '').replace(/"/g, '""'),
    getLastActivity(c).replace(/"/g, '""')
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(v => `"${v}"`).join(','))
    .join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `flow-leads-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Rendering ────────────────────────────────────────────────
const THEAD = [
  { key: 'contactName',    label: 'Name',           width: 160 },
  { key: 'businessName',  label: 'Business',        width: 150 },
  { key: 'email',          label: 'Email',           width: 200 },
  { key: 'phone',          label: 'Phone',           width: 130 },
  { key: 'listId',         label: 'Stage',           width: 120 },
  { key: 'score',          label: 'Temp',            width: 80  },
  { key: 'estimatedValue', label: 'Deal Value',     width: 100 },
  { key: 'priority',       label: 'Priority',        width: 80  },
  { key: 'assignee',       label: 'Assignee',        width: 110 },
  { key: 'leadSource',     label: 'Source',          width: 100 },
  { key: 'dueDate',        label: 'Due',             width: 90  },
  { key: 'title',          label: 'Title',           width: 200 },
  { key: 'description',     label: 'Notes',           width: 220 },
  { key: '_activity',      label: 'Last Activity',  width: 180 },
  { key: '_labels',        label: 'Labels',          width: 140 },
];

let allCards = [];
let sortKey = 'contactName';
let sortAsc = true;

function renderThead() {
  const thead = document.getElementById('thead');
  thead.innerHTML = THEAD.map(col => {
    const sorted = sortKey === col.key;
    const arrow = sorted ? (sortAsc ? '▲' : '▼') : '';
    return `<th data-key="${col.key}" class="${sorted ? 'sorted' : ''}" style="min-width:${col.width}px">
      ${col.label}<span class="sort-arrow">${arrow}</span>
    </th>`;
  }).join('');

  thead.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) sortAsc = !sortAsc;
      else { sortKey = key; sortAsc = true; }
      renderTable();
    });
  });
}

function renderTable() {
  const filtered = getFiltered();
  const sorted = [...filtered].sort((a, b) => {
    let av = a[sortKey] ?? '';
    let bv = b[sortKey] ?? '';
    if (sortKey === 'score' || sortKey === 'estimatedValue') {
      av = Number(av) || 0;
      bv = Number(bv) || 0;
    }
    if (sortKey === 'listId') {
      av = stageMap[av]?.label || av;
      bv = stageMap[bv]?.label || bv;
    }
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('row-count').textContent = `${sorted.length} / ${allCards.length} leads`;

  const tbody = document.getElementById('tbody');
  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${THEAD.length}" style="text-align:center;padding:40px;color:#6b7280">
      No leads match your filters
    </td></tr>`;
    return;
  }

  tbody.innerHTML = sorted.map(card => {
    const temp = parseTemp(card.score || card.temperature);
    const stage = stageMap[card.listId] || { label: card.listId || '—', color: '#6b7280' };
    const initials = getInitials(card.assignee);
    const gradient = getAvatarGradient(card.assignee);
    const lastAct = getLastActivity(card);
    const isOverdue = card.dueDate && new Date(card.dueDate) < new Date();

    return `<tr>
      <td><span class="contact-name">${card.contactName || card.title || '—'}</span></td>
      <td><span class="contact-business">${card.businessName || '—'}</span></td>
      <td>${card.email ? `<a class="contact-email" href="mailto:${card.email}">${card.email}</a>` : '—'}</td>
      <td><span class="contact-phone">${card.phone || '—'}</span></td>
      <td>
        <span class="stage" style="background:${stage.color}22;color:${stage.color};border:1px solid ${stage.color}44">
          ${stage.label}
        </span>
      </td>
      <td><span class="temp ${temp.cls}">${temp.label}</span></td>
      <td><span class="value">$${Number(card.estimatedValue || 0).toLocaleString()}</span></td>
      <td>
        <span class="priority priority-${card.priority || 'low'}">
          ${(card.priority || 'none').toUpperCase()}
        </span>
      </td>
      <td>
        ${card.assignee ? `
        <span class="assignee">
          <span class="avatar-sm" style="background:${gradient}">${initials}</span>
          ${card.assignee}
        </span>` : '—'}
      </td>
      <td><span class="source">${card.leadSource || '—'}</span></td>
      <td>
        <span class="due ${isOverdue ? 'overdue' : ''}">
          ${card.dueDate || '—'}
        </span>
      </td>
      <td>${card.title || '—'}</td>
      <td><span class="desc">${card.description || '—'}</span></td>
      <td><span class="activity">${lastAct}</span></td>
      <td>
        <div class="labels">
          ${(card.labels || []).map(l => `<span class="label-tag">${l.name}</span>`).join('')}
          ${(card.labels || []).length === 0 ? '—' : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const stage = document.getElementById('filter-stage').value;
  const temp = document.getElementById('filter-temp').value;
  const priority = document.getElementById('filter-priority').value;
  const assignee = document.getElementById('filter-assignee').value;

  return allCards.filter(card => {
    if (q) {
      const hay = [
        card.contactName, card.title, card.email, card.businessName,
        card.description, card.phone, card.assignee
      ].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (stage && card.listId !== stage) return false;
    if (priority && card.priority !== priority) return false;
    if (assignee && card.assignee !== assignee) return false;
    if (temp) {
      const t = parseTemp(card.score || card.temperature);
      if (temp === 'unscored' && (card.score || card.temperature)) return false;
      if (temp !== 'unscored' && t.level !== temp) return false;
    }
    return true;
  });
}

// ── Load Firebase ───────────────────────────────────────────
async function load() {
  try {
    const snap = await getDoc(boardDocRef);
    if (!snap.exists()) {
      document.getElementById('error').textContent = 'No data found in Firestore. Make sure the main app has synced first.';
      document.getElementById('error').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      return;
    }
    const data = snap.data();
    allCards = Object.values(data.cards || {});
    document.getElementById('loading').style.display = 'none';
    document.getElementById('table-wrap').style.display = 'block';
    renderThead();
    renderTable();
  } catch (e) {
    document.getElementById('error').textContent = 'Failed to load: ' + e.message;
    document.getElementById('error').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  }
}

// ── Event Listeners ─────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filter-stage').addEventListener('change', renderTable);
document.getElementById('filter-temp').addEventListener('change', renderTable);
document.getElementById('filter-priority').addEventListener('change', renderTable);
document.getElementById('filter-assignee').addEventListener('change', renderTable);
document.getElementById('btn-export').addEventListener('click', () => exportCSV(getFiltered()));

// ── Init ─────────────────────────────────────────────────────
load();
</script>
</body>
</html>
