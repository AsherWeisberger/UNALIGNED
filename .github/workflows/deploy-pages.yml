name: Deploy Pages

on:
  push:
    branches: [AI-DESIGN]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Copy site files
        run: |
          mkdir _site
          rsync -a --exclude '.git' --exclude '.github' --exclude '_site' \
                --exclude 'functions' --exclude 'scripts' --exclude '*.py' \
                ./ _site/

      - name: Compile JSX
        run: |
          npm install --no-save @babel/core @babel/cli @babel/preset-react
          npx babel _site/flow-v4 --out-dir _site/flow-v4
          npx babel _site/tweaks-panel.jsx -o _site/tweaks-panel.js

      - name: Rewrite index.html for compiled bundle
        run: python3 scripts/build_site.py _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
